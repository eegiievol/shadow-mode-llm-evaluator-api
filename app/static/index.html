<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shadow-Mode LLM Evaluator</title>
  <style>
    :root {
      --bg: #0f1420; --panel: #171e2e; --panel-2: #1e2740; --border: #2a3450;
      --text: #e6ebf5; --muted: #9aa7c2; --accent: #4f8cff; --accent-2: #6ee7b7;
      --user: #26406b; --bot: #202a44; --danger: #ff6b6b;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f4f6fb; --panel: #ffffff; --panel-2: #eef2f9; --border: #d9e0ee;
        --text: #1a2338; --muted: #5a6683; --accent: #2f6bff; --accent-2: #0ea371;
        --user: #d9e6ff; --bot: #eef2f9; --danger: #d13a3a;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh; display: flex;
      flex-direction: column; align-items: center;
    }
    header {
      width: 100%; max-width: 820px; padding: 18px 20px 8px; display: flex;
      align-items: baseline; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    header h1 { font-size: 18px; margin: 0; letter-spacing: .2px; }
    header .sub { color: var(--muted); font-size: 12px; }
    .app {
      width: 100%; max-width: 820px; flex: 1; display: flex; flex-direction: column;
      padding: 0 16px 16px; min-height: 0;
    }
    .metrics {
      display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0 12px;
    }
    .chip {
      background: var(--panel-2); border: 1px solid var(--border); border-radius: 999px;
      padding: 5px 11px; font-size: 12px; color: var(--muted);
    }
    .chip b { color: var(--text); font-variant-numeric: tabular-nums; }
    .chat {
      flex: 1; overflow-y: auto; background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px; display: flex; flex-direction: column; gap: 12px;
      min-height: 0;
    }
    .msg { display: flex; flex-direction: column; max-width: 85%; gap: 4px; }
    .msg .who { font-size: 11px; color: var(--muted); padding: 0 4px; }
    .bubble {
      padding: 10px 13px; border-radius: 12px; white-space: pre-wrap; word-wrap: break-word;
      line-height: 1.45; font-size: 14px;
    }
    .user { align-self: flex-end; align-items: flex-end; }
    .user .bubble { background: var(--user); border-top-right-radius: 4px; }
    .bot { align-self: flex-start; }
    .bot .bubble { background: var(--bot); border-top-left-radius: 4px; border: 1px solid var(--border); }
    .bot .bubble.err { border-color: var(--danger); color: var(--danger); }
    .empty { color: var(--muted); text-align: center; margin: auto; font-size: 14px; }
    form {
      display: flex; gap: 8px; margin-top: 12px;
    }
    textarea {
      flex: 1; resize: none; background: var(--panel); color: var(--text);
      border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px;
      font: inherit; font-size: 14px; min-height: 48px; max-height: 160px;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    button {
      background: var(--accent); color: #fff; border: 0; border-radius: 12px;
      padding: 0 20px; font-weight: 600; cursor: pointer; font-size: 14px;
    }
    button:disabled { opacity: .5; cursor: default; }
    .hint { color: var(--muted); font-size: 11px; margin-top: 6px; text-align: center; }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent-2); margin-right: 5px; vertical-align: middle; }
  </style>
</head>
<body>
  <header>
    <h1>🌓 Shadow-Mode LLM Evaluator</h1>
    <span class="sub" id="models">loading models…</span>
  </header>
  <div class="app">
    <div class="metrics" id="metrics">
      <span class="chip"><span class="dot"></span>connecting…</span>
    </div>
    <div class="chat" id="chat">
      <div class="empty" id="empty">Ask anything — the primary model answers here,<br/>and the candidate is evaluated in the background.</div>
    </div>
    <form id="form">
      <textarea id="input" placeholder="Type a message…  (Enter to send, Shift+Enter for newline)" autofocus></textarea>
      <button id="send" type="submit">Send</button>
    </form>
    <div class="hint">Primary responses are shown instantly; shadow evaluation happens asynchronously. Metrics refresh every 3s.</div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const empty = document.getElementById('empty');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const metricsEl = document.getElementById('metrics');
    const modelsEl = document.getElementById('models');

    function addMsg(text, who, isErr) {
      if (empty) empty.remove();
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + (who === 'You' ? 'user' : 'bot');
      const label = document.createElement('div');
      label.className = 'who'; label.textContent = who;
      const bubble = document.createElement('div');
      bubble.className = 'bubble' + (isErr ? ' err' : '');
      bubble.textContent = text;
      wrap.appendChild(label); wrap.appendChild(bubble);
      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    async function send(text) {
      addMsg(text, 'You');
      sendBtn.disabled = true;
      const pending = addMsg('…', 'Model');
      try {
        const res = await fetch('/v1/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: [{ role: 'user', content: text }] }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || ('HTTP ' + res.status));
        pending.textContent = data.response;
        pending.parentElement.querySelector('.who').textContent = 'Model · ' + data.model;
      } catch (e) {
        pending.classList.add('err');
        pending.textContent = '⚠ ' + e.message;
      } finally {
        sendBtn.disabled = false;
        refreshMetrics();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      send(text);
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
    });

    async function refreshMetrics() {
      try {
        const m = await (await fetch('/metrics')).json();
        const s = m.shadow, ev = m.evaluations;
        metricsEl.innerHTML =
          chip('requests', m.total_requests) +
          chip('match rate', m.exact_match_rate_pct + '%') +
          chip('evaluated', ev.evaluated) +
          chip('mismatches', ev.mismatches) +
          chip('shed', s.shed) +
          chip('errors', s.errors + s.timeouts);
        modelsEl.textContent = 'primary + candidate · queue ' + m.config.queue_depth + '/' + m.config.queue_size;
      } catch (e) {
        metricsEl.innerHTML = '<span class="chip">metrics unavailable</span>';
      }
    }
    function chip(label, val) {
      return '<span class="chip">' + label + ' <b>' + val + '</b></span>';
    }

    refreshMetrics();
    setInterval(refreshMetrics, 3000);
  </script>
</body>
</html>
